apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  creationTimestamp: null
  labels:
    app.kubernetes.io/name: kubevault
  name: spoketenantnamespaces.kubevault.com
spec:
  group: kubevault.com
  names:
    categories:
    - vault
    - appscode
    - all
    kind: SpokeTenantNamespaces
    listKind: SpokeTenantNamespacesList
    plural: spoketenantnamespaces
    shortNames:
    - stns
    singular: spoketenantnamespaces
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.orgCount
      name: Orgs
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          SpokeTenantNamespaces is a spoke-cluster CR maintained by the KubeVault operator on a
          managed (spoke) cluster. Its status carries the deduplicated, validated set of OpenBao
          org namespaces the spoke's client-org databases require on the hub. The hub reads it
          through an OCM ManagedClusterView and idempotently creates each namespace — the spoke
          never creates hub namespaces itself (design/tenant-namespace-hub-spoke-design.md §5.3).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
            type: string
          metadata:
            type: object
          spec:
            properties:
              hubVaultRef:
                description: |-
                  HubVaultRef identifies the hub VaultServer AppBinding (the RemoteAgent AppBinding on
                  this spoke) whose org namespaces this object tracks.
                properties:
                  name:
                    default: ""
                    type: string
                  namespace:
                    type: string
                type: object
            type: object
          status:
            properties:
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this resource.
                format: int64
                type: integer
              orgCount:
                description: OrgCount mirrors len(OrgIDs) for a cheap print column
                  / bounded status-feedback scalar.
                format: int32
                type: integer
              orgIDs:
                description: |-
                  OrgIDs is the deduplicated, validated set of OpenBao namespaces (org-ids) that the
                  spoke's client-org databases targeting the hub require. The hub ensures each exists.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
